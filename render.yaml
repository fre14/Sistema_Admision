# =============================================
# Render.com Blueprint — SAA API
# =============================================
services:
  - type: web
    name: saa-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: Jwt__Key
        generateValue: true
      - key: Jwt__Issuer
        value: SAA.API
      - key: Jwt__Audience
        value: SAA.Clients

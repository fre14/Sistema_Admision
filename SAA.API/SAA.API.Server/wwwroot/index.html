<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAA - Portal de Admisión</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <!-- Login View -->
        <div id="loginView" class="glass-card">
            <h1>Sistema de Admisión</h1>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Ingresa tu usuario" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••" required>
                </div>
                <button type="submit">Ingresar al Sistema</button>
                <div id="errorMsg" class="error-message">Credenciales incorrectas</div>
            </form>
        </div>

        <!-- Report View -->
        <div id="reportView" class="glass-card">
            <h1 id="reportTitle">Reporte de Ingresantes</h1>
            <div style="display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;">
                <button onclick="logout()" style="background: rgba(255,255,255,0.1); width: auto;">Cerrar Sesión</button>
                <button onclick="fetchReport()" style="width: auto;">Actualizar Datos</button>
                <button onclick="exportToCSV()" style="width: auto; background: #10b981;">Exportar Tabla</button>
                <button onclick="exportTodosToCSV()" style="width: auto; background: #3b82f6;">Exportar Todos (CSV)</button>
            </div>
            
            <div style="display: flex; gap: 1rem; margin-bottom: 2rem; align-items: center; flex-wrap: wrap;">
                <button id="btnViewIngresantes" onclick="setView('Ingresantes')" style="width: auto; background: #8b5cf6;">Ver Ingresantes</button>
                <button id="btnViewNoIngresantes" onclick="setView('No Ingresantes')" style="width: auto; background: rgba(255,255,255,0.1);">Ver No Ingresantes</button>
                
                <div style="margin-left: auto; display: flex; align-items: center; gap: 0.5rem;">
                    <label for="programFilter" style="color: #fff;">Filtrar Carrera:</label>
                    <select id="programFilter" onchange="renderTable()" style="padding: 0.5rem; border-radius: 4px; background: rgba(0,0,0,0.5); color: white; border: 1px solid rgba(255,255,255,0.2);">
                        <option value="">Todas las Carreras</option>
                    </select>
                </div>
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Puesto</th>
                            <th>DNI</th>
                            <th>Postulante</th>
                            <th>Programa</th>
                            <th>Puntaje</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody">
                        <!-- Data will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Postulante View -->
        <div id="postulanteView" class="glass-card" style="display: none; max-width: 600px; margin: auto;">
            <h1>Mis Resultados de Admisión</h1>
            <div style="display: flex; gap: 1rem; margin-bottom: 2rem; justify-content: center;">
                <button onclick="logout()" style="background: rgba(255,255,255,0.1); width: auto;">Cerrar Sesión</button>
            </div>
            
            <div id="postulanteResultCard" style="background: rgba(0,0,0,0.2); padding: 2rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: center;">
                <h2 id="postNombres" style="margin-bottom: 0.5rem; color: #fff;">-</h2>
                <p id="postPrograma" style="color: #9ca3af; margin-bottom: 1.5rem; font-size: 1.1rem;">-</p>
                
                <div style="display: flex; justify-content: space-around; margin-bottom: 2rem;">
                    <div>
                        <p style="color: #9ca3af; font-size: 0.9rem; margin-bottom: 0.2rem;">Puntaje</p>
                        <p id="postPuntaje" style="font-size: 1.5rem; font-weight: bold; color: #fff;">-</p>
                    </div>
                    <div>
                        <p style="color: #9ca3af; font-size: 0.9rem; margin-bottom: 0.2rem;">Puesto</p>
                        <p id="postPuesto" style="font-size: 1.5rem; font-weight: bold; color: #fbbf24;">-</p>
                    </div>
                </div>
                
                <div id="postEstado" class="badge" style="font-size: 1.2rem; padding: 0.8rem 2rem; display: inline-block;">-</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin.startsWith('file:') 
            ? 'http://localhost:5000/api' 
            : `${window.location.origin}/api`;
            
        let allData = [];
        let currentView = 'Ingresantes';
        
        async function handleLogin(e) {
            e.preventDefault();
            const usuario = document.getElementById('username').value;
            const contrasena = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombreUsuario: usuario, contrasena })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('jwt_token', data.token);
                    localStorage.setItem('user_role', data.usuario.rol);
                    
                    if (data.usuario.rol === 'Administrador') {
                        showReportView();
                    } else {
                        showPostulanteView();
                    }
                } else {
                    errorMsg.classList.add('show');
                    setTimeout(() => errorMsg.classList.remove('show'), 3000);
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMsg.innerText = 'Error de conexión con el servidor';
                errorMsg.classList.add('show');
            }
        }

        async function fetchReport() {
            const token = localStorage.getItem('jwt_token');
            if (!token) return logout();

            try {
                const response = await fetch(`${API_URL}/admision/reporte-todos`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    allData = data;
                    updateProgramFilter();
                    renderTable();
                } else if (response.status === 401 || response.status === 403) {
                    logout();
                }
            } catch (error) {
                console.error('Fetch error:', error);
            }
        }
        
        function setView(view) {
            currentView = view;
            
            document.getElementById('reportTitle').innerText = view === 'Ingresantes' 
                ? 'Reporte de Ingresantes' 
                : 'Reporte de No Ingresantes';
                
            document.getElementById('btnViewIngresantes').style.background = view === 'Ingresantes' ? '#8b5cf6' : 'rgba(255,255,255,0.1)';
            document.getElementById('btnViewNoIngresantes').style.background = view === 'No Ingresantes' ? '#ef4444' : 'rgba(255,255,255,0.1)';
            
            renderTable();
        }
        
        function updateProgramFilter() {
            const select = document.getElementById('programFilter');
            const programs = [...new Set(allData.map(item => item.programaAcademico))].sort();
            
            select.innerHTML = '<option value="">Todas las Carreras</option>';
            programs.forEach(prog => {
                const option = document.createElement('option');
                option.value = prog;
                option.innerText = prog;
                select.appendChild(option);
            });
        }
        
        function renderTable() {
            const filterProg = document.getElementById('programFilter').value;
            let filteredData = allData.filter(item => {
                const matchesView = currentView === 'Ingresantes' 
                    ? item.estado === 'Ingresante' 
                    : item.estado !== 'Ingresante';
                const matchesProg = filterProg ? item.programaAcademico === filterProg : true;
                return matchesView && matchesProg;
            });
            populateTable(filteredData);
        }

        function populateTable(data) {
            const tbody = document.getElementById('reportTableBody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No hay resultados para mostrar.</td></tr>';
                return;
            }

            data.forEach(item => {
                const tr = document.createElement('tr');
                const badgeClass = item.estado === 'Ingresante' ? 'badge' : (item.estado === 'Aprobado' ? 'badge badge-warning' : 'badge badge-danger');
                const badgeColor = item.estado === 'Ingresante' ? '#10b981' : (item.estado === 'Aprobado' ? '#f59e0b' : '#ef4444');
                
                tr.innerHTML = `
                    <td style="font-weight: 700; color: #fbbf24;">#${item.puesto}</td>
                    <td>${item.dni || ''}</td>
                    <td>${item.nombres} ${item.apellidos}</td>
                    <td>${item.programaAcademico}</td>
                    <td style="font-weight: 600; color: #fff;">${item.puntaje}</td>
                    <td><span class="badge" style="background: ${badgeColor}20; color: ${badgeColor}; border-color: ${badgeColor}40;">${item.estado || 'Ingresante'}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function exportToCSV() {
            const table = document.querySelector("table");
            let csv = [];
            for (let i = 0; i < table.rows.length; i++) {
                let row = [], cols = table.rows[i].querySelectorAll("td, th");
                for (let j = 0; j < cols.length; j++) {
                    row.push('"' + cols[j].innerText + '"');
                }
                csv.push(row.join(","));
            }
            
            const csvFile = new Blob([csv.join("\n")], {type: "text/csv"});
            const downloadLink = document.createElement("a");
            downloadLink.download = "Reporte_Ingresantes.csv";
            downloadLink.href = window.URL.createObjectURL(csvFile);
            downloadLink.style.display = "none";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }

        async function exportTodosToCSV() {
            const token = localStorage.getItem('jwt_token');
            if (!token) return logout();

            try {
                const response = await fetch(`${API_URL}/admision/reporte-todos`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    let csv = ["DNI,Nombres,Apellidos,Programa,Puntaje,Estado"];
                    
                    data.forEach(item => {
                        let row = [
                            `"${item.dni}"`,
                            `"${item.nombres}"`,
                            `"${item.apellidos}"`,
                            `"${item.programaAcademico}"`,
                            `"${item.puntaje}"`,
                            `"${item.estado}"`
                        ];
                        csv.push(row.join(","));
                    });

                    const csvFile = new Blob([csv.join("\n")], {type: "text/csv"});
                    const downloadLink = document.createElement("a");
                    downloadLink.download = "Reporte_Todos_Postulantes.csv";
                    downloadLink.href = window.URL.createObjectURL(csvFile);
                    downloadLink.style.display = "none";
                    document.body.appendChild(downloadLink);
                    downloadLink.click();
                    document.body.removeChild(downloadLink);
                } else {
                    alert("Error al obtener los datos");
                }
            } catch (error) {
                console.error('Export error:', error);
                alert("Error de conexión al exportar");
            }
        }

        function showReportView() {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('postulanteView').style.display = 'none';
            document.getElementById('reportView').style.display = 'block';
            fetchReport();
        }
        
        function showPostulanteView() {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('reportView').style.display = 'none';
            document.getElementById('postulanteView').style.display = 'block';
            fetchMiResultado();
        }
        
        async function fetchMiResultado() {
            const token = localStorage.getItem('jwt_token');
            if (!token) return logout();

            try {
                // Try fetching my result
                const response = await fetch(`${API_URL}/postulantes/mi-resultado`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    document.getElementById('postNombres').innerText = `${data.nombres} ${data.apellidos}`;
                    document.getElementById('postPrograma').innerText = data.programa;
                    document.getElementById('postPuntaje').innerText = data.puntaje;
                    document.getElementById('postPuesto').innerText = `#${data.puesto}`;
                    
                    const estadoEl = document.getElementById('postEstado');
                    estadoEl.innerText = data.estado;
                    
                    if (data.estado === 'Ingresante') {
                        estadoEl.style.background = '#10b98120';
                        estadoEl.style.color = '#10b981';
                        estadoEl.style.borderColor = '#10b98140';
                    } else if (data.estado === 'Aprobado') {
                        estadoEl.style.background = '#f59e0b20';
                        estadoEl.style.color = '#f59e0b';
                        estadoEl.style.borderColor = '#f59e0b40';
                    } else {
                        estadoEl.style.background = '#ef444420';
                        estadoEl.style.color = '#ef4444';
                        estadoEl.style.borderColor = '#ef444440';
                    }
                    
                } else if (response.status === 401 || response.status === 403) {
                    logout();
                }
            } catch (error) {
                console.error('Fetch error:', error);
            }
        }

        function logout() {
            localStorage.removeItem('jwt_token');
            localStorage.removeItem('user_role');
            document.getElementById('loginView').style.display = 'block';
            document.getElementById('reportView').style.display = 'none';
            document.getElementById('postulanteView').style.display = 'none';
            document.getElementById('loginForm').reset();
        }

        // Check if already logged in on load
        if (localStorage.getItem('jwt_token')) {
            const role = localStorage.getItem('user_role');
            if (role === 'Administrador') {
                showReportView();
            } else {
                showPostulanteView();
            }
        }
    </script>
</body>
</html>
